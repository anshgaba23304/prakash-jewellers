spring.application.name=prakash-jewellers

# ---- Server (Render sets PORT) ----
server.port=${PORT:8080}

# ---- H2 (file-based so data persists across restarts) ----
spring.datasource.url=jdbc:h2:file:./data/prakash
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

# H2 web console at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---- Live rate provider (free, no API key required) ----
rates.provider.gold-url=https://api.gold-api.com/price/XAU
rates.provider.silver-url=https://api.gold-api.com/price/XAG
rates.provider.fx-url=https://open.er-api.com/v6/latest/USD
# Refresh cached live spot prices every 10 minutes
rates.refresh-ms=600000
# Fallback USD->INR used only if the FX API is unreachable
rates.fallback-usd-inr=87.5
# Fallback spot prices (USD / troy ounce) used only if gold API is unreachable
rates.fallback-gold-usd-oz=4503.21
rates.fallback-silver-usd-oz=76.80

# ---- File uploads (images / reels stored on disk, metadata in DB) ----
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB
app.upload-dir=./uploads
